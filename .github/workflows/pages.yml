name: Deploy site (GitHub Pages)

# Publishes the static website + documentation in /pages to GitHub Pages.
# GitHub's "Deploy from a branch" source only allows / or /docs, so the site is
# served from /pages via this Actions workflow instead.

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure Pages
        # enablement: turn on Pages with build_type=workflow if not already set.
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload /pages as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
