; Reference transaction-mode PgBouncer config for Twill DB engine-server (issue #20).
;
; Serverless clients open many short-lived connections; engine-server's write
; path is a single lane per database. PgBouncer in TRANSACTION mode absorbs the
; client burst on its edge and multiplexes it onto a small, stable pool of
; backend connections, returning a backend to the pool at each COMMIT/ROLLBACK.
; The pooler is a separate process — never bundle it into engine-server.
;
; Run:
;   cargo run -p twill-server -- --listen 127.0.0.1:5433 --db file://./srv.db
;   pgbouncer deploy/pooler/pgbouncer.ini
;   psql "host=127.0.0.1 port=6432 user=postgres dbname=srv sslmode=disable"

[databases]
; Map the pooler database name -> the engine-server backend. `dbname` is the
; logical name engine-server is serving; point `host`/`port` at its listener.
srv = host=127.0.0.1 port=5433 dbname=srv

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; --- The required mode -------------------------------------------------------
; transaction mode hands a backend back to the pool at each transaction
; boundary, so N client connections share a few backends. session mode would
; pin a backend per client for its whole lifetime and defeat burst absorption.
pool_mode = transaction

; --- Pool sizing -------------------------------------------------------------
default_pool_size   = 20    ; backend connections per (database, user)
min_pool_size       = 0     ; keep no idle backends — lets the engine idle-stop
max_client_conn     = 5000  ; absorb the connection burst on the client edge
server_idle_timeout = 30    ; close idle backends after 30s → engine can scale-to-zero

; --- Auth (development) ------------------------------------------------------
; engine-server speaks cleartext (sslmode=disable). For a real deployment use
; an auth_file / auth_query and TLS on the client edge; never commit secrets.
auth_type = trust

; engine-server does not implement server-side prepared-statement protocol
; reuse across pooled transactions; disabling the cache keeps transaction mode
; correct with clients that would otherwise reuse named statements.
max_prepared_statements = 0
